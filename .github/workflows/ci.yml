name: CI

on:
  pull_request:

jobs:  
  build-and-test:

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NET/is-auth-service/AuthService/src

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AuthService.slnx

      - name: Build
        run: dotnet build AuthService.slnx --no-restore

      - name: Test
        env:
          ASPNETCORE_ENVIRONMENT: Development
          JwtSettings__Secret: IntegrationSecretKey_AuthService_123456789!
          JwtSettings__Issuer: AuthService
          JwtSettings__Audience: OrderFlowApp
          JwtSettings__AccessTokenExpirationMinutes: "60"
          JwtSettings__RefreshTokenExpirationDays: "7"
        run: dotnet test AuthService.slnx --no-build
  
  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          echo "SA_PASSWORD=${{ secrets.SA_PASSWORD }}"   >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}"           >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"     >> .env
          echo "API_PORT=5000"                            >> .env
          echo "SQL_PORT=1433"                            >> .env
          echo "MSSQL_MEMORY_LIMIT_MB=1500"               >> .env

      - name: Docker Compose up
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in {1..15}; do
            curl -sf http://localhost:5000/scalar/v1 && break
            echo "Waiting... ($i)"
            sleep 5
          done

      - name: Tear down
        if: always()
        run: docker compose down -v
  
  analyze:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build for CodeQL
        working-directory: NET/is-auth-service/AuthService/src
        run: dotnet build AuthService.slnx

      - uses: github/codeql-action/analyze@v3